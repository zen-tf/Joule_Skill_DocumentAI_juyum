_schema-version: 3.3.0
ID: doc-api
description: A simple CAP project for Document Storage and AI Integration.
version: 1.0.0
modules:
- name: doc-api-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: doc-api-auth-juyum
  - name: doc-api-db-juyum
  - name: doc-api-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: doc-api-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: doc-api-db-juyum
  parameters:
    buildpack: nodejs_buildpack
- name: doc-api-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: doc-api-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - documentai.zip
      name: documentai
      target-path: resources/
- name: documentai
  type: html5
  path: app/documentai
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: doc-api-auth-juyum
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: doc-api-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-name: doc-api-auth-juyum
    service-plan: application
- name: doc-api-db-juyum
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-name: DocumentAI-juyum
    service-plan: hdi-shared
  properties:
    hdi-container-name: ${service-name}
- name: doc-api-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-name: doc-api-destination
    service-plan: lite
- name: doc-api-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: doc-api-html5-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
